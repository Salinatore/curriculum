name: Build and Deploy CV to Github Pages

on:
  push:
    branches: [main]
    paths:
      - '*.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with: 
            version: "0.11.26"
            enable-cache: true

      - name: Render CV to PDF
        run: |
          uvx rendercv render Alessandro_Gardini_CV_IT.yaml \
            --dont-generate-markdown --dont-generate-html --dont-generate-png

      - name: Prepare Pages folder
        run: |
          mkdir -p public
          cp rendercv_output/*.pdf public/cv.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5